# Rename `app` to something globally unique before `fly launch --no-deploy`.
app = "happyrobot-carrier-api-kv"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # When deploying from this directory, also pass: --dockerfile-build-context-path=..
  # so the Dockerfile's `COPY api/...` resolves correctly. See README.

[env]
  DATABASE_URL = "sqlite:////data/app.db"

[[mounts]]
  source = "carrier_api_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
